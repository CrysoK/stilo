{% load static %}
<div class="modal fade" id="appointmentModal" tabindex="-1" aria-labelledby="appointmentModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="appointmentModalLabel">Confirmar Turno</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p><strong>Servicio:</strong> <span id="modalServiceName"></span></p>
        <p><strong>Fecha y Hora:</strong> <span id="modalDateTime"></span></p>
        <hr>
        <p class="mb-1"><strong>Duración:</strong> <span id="modalServiceDuration"></span> minutos</p>
        <p><strong>Precio:</strong> $<span id="modalServicePrice"></span></p>
        
        <div id="form-errors" class="alert alert-danger d-none mt-3"></div>

        <div id="payment-options-container" class="mt-3">
          <label class="form-label fw-bold mb-2">Selecciona la modalidad de pago</label>
          <div class="list-group" id="payment-options-list">
            <!-- Se poblará dinámicamente con JS -->
          </div>
          <div class="d-flex align-items-center justify-content-center gap-2 mt-3 pt-2 border-top text-muted small">
            <i class="bi bi-shield-check text-success"></i> Pago 100% seguro procesado por 
            <img src="{% static 'img/mp.svg' %}" alt="Mercado Pago" style="height: 30px;">
          </div>
        </div>

        <form id="appointmentForm" method="post" action="{{ request.path }}">
          {% csrf_token %}
          {{ form.service }}
          {{ form.start_time }}
          {{ form.payment_method }}
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" id="confirmAppointmentBtn">Reservar</button>
      </div>
    </div>
  </div>
</div>
